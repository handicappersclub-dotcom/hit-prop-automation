name: Build MLB Hit Prop Slate

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 20-23 * * *"
    - cron: "*/15 0-2 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests pandas python-dateutil

      - name: Build enriched slate
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        run: |
          python scripts/build_slate.py

      - name: Commit updated slate
        run: |
          git config user.name "hit-prop-bot"
          git config user.email "hit-prop-bot@users.noreply.github.com"
          git add data/latest-enriched-slate.json
          git commit -m "chore: update enriched MLB slate" || echo "No changes to commit"
          git push
